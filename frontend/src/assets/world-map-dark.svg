<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" preserveAspectRatio="xMidYMid slice">
  <rect width="1000" height="500" fill="#0A0C10"/>
  <g fill="#30363D" stroke="#414753" stroke-width="0.5">
    <!-- North America -->
    <path d="M50,80 L150,70 L200,90 L250,60 L300,70 L320,100 L280,150 L250,200 L200,220 L150,200 L100,180 L50,150 L30,100 Z"/>
    <!-- South America -->
    <path d="M200,230 L250,220 L280,250 L300,300 L280,380 L250,420 L220,400 L200,350 L180,300 L190,260 Z"/>
    <!-- Europe -->
    <path d="M450,70 L500,60 L550,70 L580,90 L570,120 L540,130 L500,120 L470,110 L450,90 Z"/>
    <!-- Africa -->
    <path d="M450,140 L500,130 L550,150 L580,200 L570,280 L530,340 L480,320 L450,280 L440,220 L440,170 Z"/>
    <!-- Asia -->
    <path d="M580,60 L650,50 L750,60 L850,80 L900,100 L880,150 L820,180 L750,200 L700,190 L650,170 L620,140 L590,100 Z"/>
    <!-- Australia -->
    <path d="M780,300 L850,290 L900,310 L890,360 L850,380 L800,370 L770,340 Z"/>
  </g>
  <!-- Grid lines -->
  <g stroke="#30363D" stroke-width="0.3" fill="none" opacity="0.3">
    <!-- Longitude lines -->
    <line x1="100" y1="0" x2="100" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="700" y1="0" x2="700" y2="500"/>
    <line x1="800" y1="0" x2="800" y2="500"/>
    <line x1="900" y1="0" x2="900" y2="500"/>
    <!-- Latitude lines -->
    <line x1="0" y1="50" x2="1000" y2="50"/>
    <line x1="0" y1="100" x2="1000" y2="100"/>
    <line x1="0" y1="150" x2="1000" y2="150"/>
    <line x1="0" y1="200" x2="1000" y2="200"/>
    <line x1="0" y1="250" x2="1000" y2="250"/>
    <line x1="0" y1="300" x2="1000" y2="300"/>
    <line x1="0" y1="350" x2="1000" y2="350"/>
    <line x1="0" y1="400" x2="1000" y2="400"/>
    <line x1="0" y1="450" x2="1000" y2="450"/>
  </g>
</svg>
